name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ruff doesn't need torch installed — use the standalone ruff action
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check src/"

  test:
    name: Test (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pre-install CPU torch before uv sync so the CUDA variant is never fetched.
      # --no-install-package torch in the next step tells uv to leave it alone.
      - name: Install CPU PyTorch
        run: |
          uv pip install torch \
            --index-url https://download.pytorch.org/whl/cpu

      # Install everything else from the lockfile; skip torch (already installed).
      - name: Install project + dev dependencies
        run: uv sync --group dev --no-install-package torch

      # PyG C extensions — CPU wheel URL derived from the installed torch version.
      - name: Install PyG CPU extensions
        run: |
          TORCH_VER=$(uv run python -c "import torch; print(torch.__version__.split('+')[0])")
          uv pip install torch_scatter torch_sparse torch_cluster \
            --find-links "https://data.pyg.org/whl/torch-${TORCH_VER}+cpu.html"

      - name: Run tests
        run: uv run pytest --tb=short -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 7
