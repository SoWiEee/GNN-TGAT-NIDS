dataset: NF-UNSW-NB15-v2
graph_type: temporal

# raw_format: unsw_nb15_raw  → load UNSW-NB15_1-4.csv (no header, with IP cols)
# raw_format: single_csv     → load a single pre-merged CSV (fallback)
raw_format: unsw_nb15_raw
raw_dir: src/data/raw/NF-UNSW-NB15-v2/CSV Files

# Fallback for single_csv mode
raw_path:       ${paths.data_raw}/NF-UNSW-NB15-v2.csv
processed_dir:  ${paths.data_processed}/temporal
scaler_path:    ${paths.data_processed}/temporal/scaler.pkl

# Chronological split ratios — must sum to 1.0
splits:
  train: 0.60
  val:   0.20
  test:  0.20

normalization:
  method: zscore
  clip_sigma: 3.0

# Time2Vec encoding parameters
time_encoding:
  dim: 64
