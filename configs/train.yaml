defaults:
  - base
  - model: graphsage
  - data: static_default
  - _self_

train:
  lr: 0.001
  epochs: 200
  batch_size: 32
  save_every: 10        # save periodic checkpoint every N epochs
  val_every: 1          # run val evaluation every N epochs (increase to skip)
  num_workers: 0        # DataLoader workers (0 = main process; safe on Windows)
  use_amp: true         # automatic mixed precision (CUDA only)
  loss: focal           # "focal" | "cross_entropy"
  focal_gamma: 2.0      # focusing exponent (ignored when loss=cross_entropy)
  checkpoint_dir: ${paths.checkpoints}/${hydra:runtime.choices.model}
